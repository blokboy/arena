# Throwaway Postgres for the integration test tier.
#
#   pnpm db:test:up         # start (waits for healthy)
#   pnpm test:integration
#   pnpm db:test:down       # stop and discard data
#
# Port 5433 on the host so it never collides with a local dev Postgres on 5432.
# Data lives on tmpfs — intentionally ephemeral, wiped on `down`.
#
# Postgres 16 to match production (Neon/Vercel Postgres) and the service
# container in .github/workflows/ci.yml. Ledger integration tests must run
# against real Postgres `numeric` semantics — never SQLite.
services:
  postgres-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: arena
      POSTGRES_PASSWORD: arena
      POSTGRES_DB: arena_test
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arena -d arena_test"]
      interval: 2s
      timeout: 2s
      retries: 15
